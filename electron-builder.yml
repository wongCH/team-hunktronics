appId: com.hunktronics.agentcontrolpanel
productName: Agent Control Panel
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
electronLanguages:
  - en
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  darkModeSupport: true
# Code signing & notarization are intentionally omitted for local MVP builds.
# Add `identity`, `hardenedRuntime`, `entitlements`, and notarize config before distribution.
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
